# ─────────────────────────────────────────────────────────────────────
# foodie.thecodeman.cloud — site config for the shared nginx stack.
#
# Install:
#   cp deploy/nginx/foodie.thecodeman.cloud.conf \
#      /home/murx/shared/nginx/conf.d/foodie.thecodeman.cloud.conf
#   docker exec nginx nginx -t           # validate
#   docker exec nginx nginx -s reload    # apply
#
# DNS:
#   An A record for foodie.thecodeman.cloud must point to the VPS public IP
#   BEFORE running certbot, or the ACME challenge will fail.
#
# First cert issuance (run once from /home/murx/shared/):
#   docker compose -f docker-compose.infra.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot \
#     -d foodie.thecodeman.cloud \
#     --email you@example.com --agree-tos --no-eff-email
#   docker exec nginx nginx -s reload
#
# Cert path (matches shared infra certbot volume mapping):
#   /etc/letsencrypt/live/foodie.thecodeman.cloud/{fullchain,privkey}.pem
# ─────────────────────────────────────────────────────────────────────

# Upstreams — resolved on the shared proxy-net by container name.
upstream foodie_web {
    server foodie-web:3000;
    keepalive 32;
}

upstream foodie_api {
    server foodie-api:3001;
    keepalive 32;
}

# HTTP :80 — ACME challenge + redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name foodie.thecodeman.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — terminates TLS, routes to web or api.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name foodie.thecodeman.cloud;

    ssl_certificate     /etc/letsencrypt/live/foodie.thecodeman.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foodie.thecodeman.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — force HTTPS for 1 year (no preload; easy to back out).
    add_header Strict-Transport-Security "max-age=31536000" always;
    # iOS PWA + camera require a valid HTTPS origin; nothing else to do here.

    # Photo uploads go to /api/souvenirs (multipart via multer + sharp).
    # Give comfortable headroom above the 1MB express.json limit.
    client_max_body_size 15m;

    # Proxy timeouts — sharp resize + first-Prisma-query cold start can
    # exceed the nginx default (60s) on a small VPS.
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
    proxy_connect_timeout 10s;

    # ── API: direct to Express, same origin (Better-Auth cookies stay happy)
    location /api/ {
        proxy_pass http://foodie_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── Everything else: Next.js (diner PWA + portal + admin route groups)
    location / {
        proxy_pass http://foodie_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # HMR + server actions sometimes use websockets even in prod.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
