name: guide-foodie-journey-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    env_file: .env
    command: sh -c "cd /app/packages/db && npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    env_file: .env
    restart: unless-stopped
    volumes:
      - /srv/foodie/images:/var/data/images # host bind per D-10 (Phase 6 confirms exact path)
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: runtime
    env_file: .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  # ─────────────────────────────────────────────────────────────────
  # TODO Phase 6 (per CONTEXT D-15): reverse proxy + TLS via Let's Encrypt
  # Caddy is the simplest default (automatic HTTPS + Let's Encrypt renewal).
  # Uncomment and configure in Phase 6 once a VPS provider is chosen.
