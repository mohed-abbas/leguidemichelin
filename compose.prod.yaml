name: guide-foodie-journey-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    env_file: .env
    command: sh -c "cd /app/packages/db && npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    env_file: .env
    restart: unless-stopped
    volumes:
      - /srv/foodie/images:/var/data/images # host bind per D-10 (Phase 6 confirms exact path)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    depends_on:
      migrate:
        condition: service_completed_successfully

  # One-shot: idempotent demo seed (restaurants/dishes/rewards + admin/staff/diner
  # demo accounts + sample souvenirs). Reuses packages/db/prisma/seed.ts via tsx
  # which is bundled into the runtime image (builder stage's full node_modules
  # is copied into runtime, so devDeps like tsx and prisma CLI are available).
  #
  # Demo accounts (passwords are in seed.ts and source-controlled — fine for a
  # demo VPS, NOT for a real production deployment). Change them in seed.ts
  # before deploying anywhere you don't want public admin access.
  seed:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    env_file: .env
    environment:
      SEED_API_BASE: "http://api:3001"
    command: sh -c "cd /app/packages/db && npx tsx prisma/seed.ts"
    depends_on:
      api:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: runtime
    env_file: .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  # ─────────────────────────────────────────────────────────────────
  # TODO Phase 6 (per CONTEXT D-15): reverse proxy + TLS via Let's Encrypt
  # Caddy is the simplest default (automatic HTTPS + Let's Encrypt renewal).
  # Uncomment and configure in Phase 6 once a VPS provider is chosen.
  # ─────────────────────────────────────────────────────────────────
  #
  # reverse-proxy:
  #   image: caddy:2
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   depends_on:
  #     web:
  #       condition: service_started
  #     api:
  #       condition: service_started

volumes:
  postgres-data:
